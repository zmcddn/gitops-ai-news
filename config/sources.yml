site:
  title: "Daily AI News"
  timezone: "America/Vancouver"
  hours_back: 36
  max_items: 18
  max_per_source: 4
  min_score: 1.0
  suppress_seen_days: 14
  polite_delay_seconds: 0.2
  digest_dir: "digests"
  docs_dir: "docs"
  data_dir: "data/items"
  seen_path: "data/seen_urls.json"
  model: "openai/gpt-4o-mini"
  temperature: 0.2
  max_completion_tokens: 2200
  editor_notes: "Focus on AI models, developer tools, safety, regulation, chips, open source, and product launches."

keywords:
  high:
    - "openai"
    - "anthropic"
    - "deepmind"
    - "gemini"
    - "gpt"
    - "claude"
    - "llama"
    - "mistral"
    - "model"
    - "agent"
    - "ai safety"
    - "benchmark"
    - "inference"
    - "training"
    - "gpu"
    - "chip"
    - "github copilot"
    - "mcp"
    - "regulation"
  medium:
    - "machine learning"
    - "robotics"
    - "multimodal"
    - "open source"
    - "research"
    - "startup"
    - "funding"
    - "privacy"
    - "security"
    - "developer"
    - "enterprise"
  penalty:
    - "sponsored"
    - "podcast"
    - "webinar"
    - "coupon"


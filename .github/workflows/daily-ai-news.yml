name: Daily AI News GitOps

on:
  workflow_dispatch:
    inputs:
      no_ai:
        description: "Generate deterministic digest without calling GitHub Models"
        required: false
        type: boolean
        default: false
  schedule:
    # Runs daily at 5:17 AM America/Vancouver. The odd minute avoids top-of-hour load.
    - cron: "17 5 * * *"
      timezone: "America/Vancouver"

permissions:
  contents: write   # commit generated Markdown/JSON back to the repository
  models: read      # call GitHub Models with GITHUB_TOKEN
  issues: write     # optional: only used when CREATE_GITHUB_ISSUE=true
  pages: write      # deploy the generated /docs site to GitHub Pages
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: daily-ai-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          # Checkout the branch head, not the old run SHA, so re-runs do not push from stale history.
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CREATE_GITHUB_ISSUE: ${{ vars.CREATE_GITHUB_ISSUE || 'false' }}
          NO_AI: ${{ github.event_name == 'workflow_dispatch' && inputs.no_ai || 'false' }}
        run: |
          set -euo pipefail
          EXTRA=""
          if [ "$NO_AI" = "true" ]; then EXTRA="--no-ai"; fi
          python src/ai_news_aggregator/main.py --config config/sources.yml $EXTRA

      - name: Commit generated digest
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first so untracked daily files are included in the change check.
          git add digests docs data
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "chore: update daily AI news digest"

          # If the branch moved while this job was running, rebase before pushing.
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: generate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
